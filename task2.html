<!DOCTYPE html>
<html>
    <head>
        <title>DIV Container Layout</title>
    </head>
    <body>
        <!--Header-->
        <div style="background-color:lightblue;border:2px solid blue;padding:10px; text-align:center;">
            <h1>Header Section</h1>
            <p>This is the header container</p>
        </div>
        <br>
        <!--Main Content Area-->
        <div style="border:2px solid black; background-color: white;padding:10px;height:250px">
            <!--left content-->
            <div style="background-color: lightyellow; border:2px solid orange;width:45%;float:left;padding:10px;">
                <h3>left content</h3>
                <p>This is left aligned div.</p>
            </div>
            <!--Right content-->
            <div style="background-color: rgb(204, 35, 35);border:2px solid green;width: 45%;;float:right;padding:10px;">
                <h3>Right content</h3>
                <p>This is right aligned div.</p>
            </div>
            <!-- left Bottom content-->
            <div style="background-color:rgb(103, 213, 103);border:2px solid green;width:35%;float:left;padding:10px;">
                <h3>Right Content</h3>
                <p>This is right aligned div</p>
            </div>
            <!-- right Bottom content-->
            <div style="background-color:rgb(225, 159, 159);border:2px solid rgb(34, 119, 34);width:45%;float:right;padding:10px;">
                 <h3>Right Content</h3>
                 <p>This is right aligned div<p>
            </div>
            </div>

            <!--center div--><br>
            <div style="width:50%;margin:auto;background-color: pink;border:2px solid red;padding:10px;text-align:center;">
                <h3>center container</h3>
                <p>this div is centered on the page</p>
            </div>
            <br>
            <!--footer-->
            <div style="background-color:lightgray;border:2px solid gray;padding:10px;text-align:center;">
                <p>footer section</p>
            </div>
    </body>
</html>
